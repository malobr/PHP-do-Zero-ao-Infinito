version: "3.8"

services:
    app:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        image: php-zero-app
        container_name: php-zero-app
        volumes:
            - ./desafios:/var/www/html  # Mapeia sua pasta de estudos para dentro do container
        networks:
            - php-zero-net

    web:
        image: nginx:alpine
        container_name: php-zero-nginx
        ports:
            - "8001:80"
        volumes:
            - ./desafios:/var/www/html  # Nginx precisa ver os mesmos arquivos
            - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - php-zero-net

    db:
        image: mysql:8.0
        container_name: php-zero-mysql
        ports:
            - "3308:3306"
        environment:
            MYSQL_DATABASE: php_zero_db
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - php-zero-net

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: php-zero-phpmyadmin
        ports:
            - "8084:80"
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_USER: root
            PMA_PASSWORD: root
        depends_on:
            - db
        networks:
            - php-zero-net

volumes:
    dbdata:

networks:
    php-zero-net:
        driver: bridge
